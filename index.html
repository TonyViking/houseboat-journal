/* =========================================================
   API LAYER
   Talks to Google Apps Script if window.JOURNAL_CONFIG.scriptUrl is set;
   falls back to localStorage transparently otherwise.
   Apps Script side will receive: { section, action: 'save'|'load', payload }
========================================================= */
const SCRIPT_URL = (window.JOURNAL_CONFIG && window.JOURNAL_CONFIG.scriptUrl) || null;
const LS_PREFIX = 'houseboat_journal:';

const api = {
  async load(section) {
    if (SCRIPT_URL) {
      try {
        const url = `${SCRIPT_URL}?section=${encodeURIComponent(section)}&action=load`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Network ' + res.status);
        const data = await res.json();
        return data.entries || [];
      } catch (e) {
        console.warn('Remote load failed, falling back to local:', e);
      }
    }
    const raw = localStorage.getItem(LS_PREFIX + section);
    return raw ? JSON.parse(raw) : [];
  },
  async save(section, entries) {
    // Always mirror to localStorage so nothing is lost
    localStorage.setItem(LS_PREFIX + section, JSON.stringify(entries));
    if (SCRIPT_URL) {
      try {
        // Use text/plain to avoid CORS preflight on Apps Script
        await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ section, action: 'save', entries })
        });
      } catch (e) {
        console.warn('Remote save failed (kept locally):', e);
      }
    }
  }
};

/* Hook for one section's entries */
function useSection(section) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    let alive = true;
    api.load(section).then(data => {
      if (!alive) return;
      setEntries(Array.isArray(data) ? data : []);
      setLoading(false);
    });
    return () => { alive = false; };
  }, [section]);
  const update = useCallback(async (next) => {
    setEntries(next);
    await api.save(section, next);
  }, [section]);
  return { entries, update, loading };
}

function Meditate({ onDone }) {
  const [phase, setPhase] = useState('setup'); // setup | running | done
  const [duration, setDuration] = useState(10 * 60); // seconds
  const [remaining, setRemaining] = useState(duration);
  const [soundMode, setSoundMode] = useState('chime'); // chime | metronome | silent
  const [breathPhase, setBreathPhase] = useState('in'); // in | hold | out | hold-out
  const tickRef = useRef(null);
  const audioCtxRef = useRef(null);
  const tickAudioRef = useRef(null);

  // Lazy-init audio context
  const ensureAudio = () => {
    if (!audioCtxRef.current) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtxRef.current = new AC();
    }
    return audioCtxRef.current;
  };

  const playBeep = (freq = 528, dur = 0.6, type = 'sine', vol = 0.18) => {
    try {
      const ctx = ensureAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = 0;
      osc.connect(gain).connect(ctx.destination);
      const now = ctx.currentTime;
      gain.gain.linearRampToValueAtTime(vol, now + 0.05);
      gain.gain.linearRampToValueAtTime(0, now + dur);
      osc.start(now);
      osc.stop(now + dur + 0.05);
    } catch (e) { /* ignore */ }
  };

  const playMetronomeTick = () => playBeep(880, 0.05, 'square', 0.08);
  const playChime = () => {
    playBeep(528, 1.4, 'sine', 0.2);
    setTimeout(() => playBeep(660, 1.6, 'sine', 0.15), 200);
    setTimeout(() => playBeep(792, 2.0, 'sine', 0.12), 400);
  };

  const start = () => {
    setRemaining(duration);
    setPhase('running');
  };

  // Breathing cycle: in 4s, hold 4s, out 4s, hold 4s
  useEffect(() => {
    if (phase !== 'running') return;
    const cycle = ['in', 'hold', 'out', 'hold-out'];
    let idx = 0;
    setBreathPhase(cycle[0]);
    if (soundMode === 'metronome') playMetronomeTick();
    const breathTimer = setInterval(() => {
      idx = (idx + 1) % cycle.length;
      setBreathPhase(cycle[idx]);
      if (soundMode === 'metronome') playMetronomeTick();
    }, 4000);
    return () => clearInterval(breathTimer);
  }, [phase, soundMode]);

  // Countdown timer
  useEffect(() => {
    if (phase !== 'running') return;
    tickRef.current = setInterval(() => {
      setRemaining(r => {
        if (r <= 1) {
          clearInterval(tickRef.current);
          setPhase('done');
          if (soundMode !== 'silent') playChime();
          return 0;
        }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(tickRef.current);
  }, [phase]);

  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');

  const breathLabel = {
    'in': 'Breathe in',
    'hold': 'Hold',
    'out': 'Breathe out',
    'hold-out': 'Hold'
  }[breathPhase];

  const circleClass = {
    'in': 'breathe-in',
    'hold': 'breathe-hold',
    'out': 'breathe-out',
    'hold-out': 'breathe-hold-out'
  }[breathPhase];

  if (phase === 'setup') {
    return (
      <div>
        <SectionHeader num="01" title="Go quiet" sub="A breath, a beat, a moment." />
        <div className="dashed-card p-6 mt-4">
          <label className="hand text-xl block mb-2">how long?</label>
          <div className="flex gap-2 flex-wrap mb-5">
            {[5, 10, 15, 20].map(m => (
              <button key={m}
                onClick={() => { setDuration(m*60); setRemaining(m*60); }}
                className="btn"
                style={duration === m*60 ? { background: 'var(--coral)', color: 'var(--cream)' } : {}}>
                {m} min
              </button>
            ))}
          </div>
          <label className="hand text-xl block mb-2">sound</label>
          <div className="flex gap-2 flex-wrap">
            {[
              {v:'chime', l:'calm alarm at the end'},
              {v:'metronome', l:'metronome on each breath'},
              {v:'silent', l:'silent'}
            ].map(o => (
              <button key={o.v}
                onClick={() => setSoundMode(o.v)}
                className="btn"
                style={soundMode === o.v ? { background: 'var(--coral)', color: 'var(--cream)' } : {}}>
                {o.l}
              </button>
            ))}
          </div>
        </div>
        <div className="mt-6 text-center">
          <button className="btn btn-primary text-lg" onClick={start}>Begin</button>
        </div>
      </div>
    );
  }

  if (phase === 'running') {
    return (
      <div className="flex flex-col items-center justify-center min-h-[70vh]">
        <div className="display text-5xl tracking-wider" style={{ color: 'var(--ink-soft)' }}>{mm}:{ss}</div>
        <div className="relative mt-12 mb-12 flex items-center justify-center" style={{ width: 240, height: 240 }}>
          <div
            className={circleClass}
            style={{
              position: 'absolute',
              width: 220, height: 220, borderRadius: '50%',
              background: 'radial-gradient(circle at 35% 35%, #f7d4a8, var(--coral) 75%)',
              boxShadow: '0 10px 40px rgba(217,105,65,0.25), inset 0 -10px 30px rgba(0,0,0,0.08)',
              transformOrigin: 'center',
              transition: 'transform 0s'
            }}
          />
          <div className="display text-2xl relative" style={{ color: 'var(--cream)' }}>{breathLabel}</div>
        </div>
        <button className="btn" onClick={() => setPhase('done')}>End early</button>
      </div>
    );
  }

  return (
    <div className="text-center py-16">
      <div className="hand text-3xl" style={{ color: 'var(--coral)' }}>and exhale.</div>
      <div className="display text-5xl mt-4" style={{ fontWeight: 600 }}>You're back.</div>
      <p className="body mt-4" style={{ color: 'var(--ink-soft)' }}>
        Take what you found here with you.
      </p>
      <button className="btn btn-primary mt-8" onClick={onDone}>Back to main</button>
    </div>
  );
}

function WordVomit({ onDone }) {
  const { entries, update } = useSection('vomit');
  const [thoughts, setThoughts] = useState(['']);
  const inputRefs = useRef([]);

  const addThought = () => {
    setThoughts(t => [...t, '']);
    setTimeout(() => {
      const el = inputRefs.current[thoughts.length];
      if (el) el.focus();
    }, 30);
  };

  const updateAt = (i, v) => {
    setThoughts(t => t.map((x, idx) => idx === i ? v : x));
  };

  const finish = async () => {
    const cleaned = thoughts.map(t => t.trim()).filter(Boolean);
    if (cleaned.length === 0) { onDone(); return; }
    const session = { id: uid(), date: nowISO(), thoughts: cleaned };
    await update([session, ...entries]);
    onDone();
  };

  return (
    <div>
      <SectionHeader num="02" title="Word vomit" sub="Short, fast. One thought at a time." />
      <p className="body mt-3" style={{ color: 'var(--ink-soft)' }}>
        Don't edit. Don't reread. Press <em>new thought</em> the moment your sentence wants to end.
      </p>

      <div className="mt-5 space-y-3">
        {thoughts.map((t, i) => (
          <div key={i} className="flex gap-2 items-start">
            <span className="hand text-2xl pt-2" style={{ color: 'var(--coral)' }}>~</span>
            <textarea
              ref={el => inputRefs.current[i] = el}
              value={t}
              onChange={e => updateAt(i, e.target.value)}
              rows={2}
              autoFocus={i === thoughts.length - 1}
              placeholder={i === 0 ? "and then I thought…" : ""}
            />
          </div>
        ))}
      </div>

      <div className="mt-6 flex flex-wrap gap-3">
        <button className="btn btn-primary" onClick={addThought}>+ new thought</button>
        <button className="btn" onClick={finish}>no new thoughts — done</button>
      </div>

      {entries.length > 0 && (
        <details className="mt-10">
          <summary className="hand text-xl cursor-pointer" style={{ color: 'var(--ink-soft)' }}>
            past sessions ({entries.length})
          </summary>
          <div className="mt-3 space-y-3">
            {entries.map(e => (
              <div key={e.id} className="entry-card">
                <div className="hand text-lg" style={{ color: 'var(--ink-soft)' }}>{fmtDate(e.date)}</div>
                <ul className="mt-2 space-y-1">
                  {e.thoughts.map((t, i) => <li key={i} className="body" style={{ lineHeight: 1.5 }}>~ {t}</li>)}
                </ul>
              </div>
            ))}
          </div>
        </details>
      )}
    </div>
  );
}

function FreeloaderForm({ initial, onSave, onCancel, onDelete }) {
  const [entry, setEntry] = useState(initial);
  const fileRef = useRef(null);

  const set = (k, v) => setEntry(e => ({ ...e, [k]: v }));
  const setAnswer = (i, v) => setEntry(e => {
    const next = [...e.answers]; next[i] = v;
    return { ...e, answers: next };
  });

  const onFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      // resize to keep base64 small
      const img = new Image();
      img.onload = () => {
        const max = 400;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = img.width * scale, h = img.height * scale;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        set('photo', canvas.toDataURL('image/jpeg', 0.78));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <SectionHeader num="03" title={entry.name || 'New freeloader'} sub="Name them. Picture them. Then ask." />

      <div className="dashed-card p-5 mt-4 space-y-4">
        <div>
          <label className="hand text-xl block mb-1">name</label>
          <input type="text" value={entry.name} onChange={e => set('name', e.target.value)} placeholder="e.g. The Director" />
        </div>

        <div>
          <label className="hand text-xl block mb-1">photo or sketch</label>
          <div className="flex items-center gap-3">
            {entry.photo ? (
              <img src={entry.photo} alt="" className="w-20 h-20 rounded-xl object-cover border-2" style={{ borderColor: 'var(--ink)' }} />
            ) : (
              <div className="w-20 h-20 rounded-xl flex items-center justify-center text-3xl" style={{ background: 'var(--paper-dark)', border: '2px dashed var(--ink-soft)' }}>
                +
              </div>
            )}
            <div className="flex flex-col gap-2">
              <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => onFile(e.target.files[0])} />
              <button className="btn" onClick={() => fileRef.current?.click()}>{entry.photo ? 'change' : 'upload'}</button>
              {entry.photo && <button className="btn btn-ghost" onClick={() => set('photo', null)}>remove</button>}
            </div>
          </div>
        </div>

        <div>
          <label className="hand text-xl block mb-1">who are they?</label>
          <textarea rows={3} value={entry.description} onChange={e => set('description', e.target.value)} placeholder="A description…" />
        </div>

        <div>
          <label className="hand text-xl block mb-1">what are they saying to you?</label>
          <textarea rows={3} value={entry.saying} onChange={e => set('saying', e.target.value)} placeholder="In their own voice…" />
        </div>
      </div>

      <h3 className="display text-2xl mt-8 mb-3" style={{ fontWeight: 600 }}>The six questions</h3>
      <div className="space-y-4">
        {FREELOADER_QUESTIONS.map((q, i) => (
          <div key={i} className="entry-card">
            <div className="hand text-lg mb-1" style={{ color: 'var(--coral)' }}>question {i+1}</div>
            <div className="body mb-2" style={{ fontWeight: 700 }}>{q}</div>
            <textarea rows={2} value={entry.answers[i] || ''} onChange={e => setAnswer(i, e.target.value)} />
          </div>
        ))}
      </div>

      <div className="mt-6 flex flex-wrap gap-3">
        <button className="btn btn-primary" onClick={() => onSave({ ...entry, updated: nowISO() })}>save</button>
        <button className="btn" onClick={onCancel}>cancel</button>
        {onDelete && <button className="btn btn-ghost" style={{ color: 'var(--coral-dark)' }} onClick={onDelete}>delete</button>}
      </div>
    </div>
  );
}

    ...e,
    puppets: {
      ...e.puppets,

function Biology({ onDone }) {
  const { entries, update, loading } = useSection('biology');
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ moment: '', reframe: '' });

  const buildReframe = () => {
    const m = draft.moment.trim();
    if (!m) return;
    // light auto-rewrite: first-person -> humans get
    const rough = m
      .replace(/^I\s/i, 'Humans ')
      .replace(/\bI\b/g, 'humans')
      .replace(/\bmy\b/gi, 'their')
      .replace(/\bme\b/gi, 'them');
    const suffix = '… and I love that.';
    const punct = /[.!?]\s*$/.test(rough) ? '' : '';
    setDraft(d => ({ ...d, reframe: `${rough}${punct} ${suffix}`.trim() }));
  };

  const save = async () => {
    if (!draft.moment.trim()) { setAdding(false); return; }
    await update([{ id: uid(), date: nowISO(), ...draft }, ...entries]);
    setDraft({ moment: '', reframe: '' });
    setAdding(false);
  };

  return (
    <div>
      <SectionHeader num="09" title="A day at the zoo" sub="Watch the human animal at work." />
      <p className="body mt-3" style={{ color: 'var(--ink-soft)' }}>
        Pick a moment you felt the animal take over. Then reframe it as something all humans do.
      </p>

      <div className="mt-5 space-y-3">
        {loading && <Loading />}
        {entries.map(e => (
          <div key={e.id} className="entry-card">
            <div className="hand text-base mb-1" style={{ color: 'var(--ink-soft)' }}>{fmtDate(e.date)}</div>
            <div className="body mb-2" style={{ fontStyle: 'italic' }}>{e.moment}</div>
            <div className="body" style={{ color: 'var(--coral-dark)', fontWeight: 700 }}>{e.reframe}</div>
          </div>
        ))}
      </div>

      {adding && (
        <div className="dashed-card p-5 mt-5">
          <label className="hand text-xl block mb-1">the moment</label>
          <textarea rows={3} value={draft.moment} onChange={e => setDraft(d => ({ ...d, moment: e.target.value }))} placeholder="raw emotions. a sentence or two." />

          <div className="mt-3 flex gap-2 flex-wrap">
            <button className="btn" onClick={buildReframe} disabled={!draft.moment.trim()}>auto-reframe →</button>
          </div>

          <label className="hand text-xl block mt-4 mb-1">reframed — as a human quirk</label>
          <textarea rows={3} value={draft.reframe} onChange={e => setDraft(d => ({ ...d, reframe: e.target.value }))} placeholder="Humans … and I love that." />

          <div className="mt-3 flex flex-wrap gap-2">
            <button className="btn btn-primary" onClick={save}>save</button>
            <button className="btn" onClick={() => { setAdding(false); setDraft({ moment: '', reframe: '' }); }}>cancel</button>
          </div>
        </div>
      )}

      <div className="mt-6 flex flex-wrap gap-3">
        {!adding && <button className="btn btn-primary" onClick={() => setAdding(true)}>+ add</button>}
        <button className="btn" onClick={onDone}>back to main</button>
      </div>
    </div>
  );
}

function Compassion({ onDone }) {
  const { entries, update, loading } = useSection('compassion');
  // entry: { id, date, photo, mean, kind }
  const [draft, setDraft] = useState({ id: uid(), photo: null, mean: '', kind: '' });
  const [step, setStep] = useState(1); // 1 photo, 2 mean, 3 read, 4 kind, 5 read kind
  const [savedPhoto, setSavedPhoto] = useState(null);
  const fileRef = useRef(null);

  // Load persistent kid-you photo from latest entry if any
  useEffect(() => {
    if (entries.length && entries[0].photo && !draft.photo) {
      setDraft(d => ({ ...d, photo: entries[0].photo }));
      setSavedPhoto(entries[0].photo);
    }
  }, [entries]);

  const onFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 500;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = img.width * scale, h = img.height * scale;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const data = canvas.toDataURL('image/jpeg', 0.78);
        setDraft(d => ({ ...d, photo: data }));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  const save = async () => {
    if (!draft.mean.trim() && !draft.kind.trim()) { onDone(); return; }
    await update([{ ...draft, date: nowISO() }, ...entries]);
    onDone();
  };

  return (
    <div>
      <SectionHeader num="10" title="Be kind to kid you" sub="A photo. Mean words. Then kinder ones." />

      <div className="mt-4 flex gap-2 flex-wrap">
        {[1,2,3,4,5].map(s => (
          <button key={s} className="btn" style={{
            background: step === s ? 'var(--coral)' : (step > s ? 'var(--sage)' : 'var(--cream)'),
            color: step === s || step > s ? 'var(--cream)' : 'var(--ink)',
            padding: '0.4rem 0.8rem',
            fontSize: '0.9rem'
          }} onClick={() => setStep(s)}>
            {s}
          </button>
        ))}
      </div>

      {step === 1 && (
        <div className="dashed-card p-5 mt-5 text-center">
          <div className="hand text-xl mb-3">a photo of kid you</div>
          <p className="body" style={{ color: 'var(--ink-soft)' }}>find one where you're smiling. it matters.</p>
          {draft.photo ? (
            <img src={draft.photo} alt="kid you" className="mt-4 mx-auto rounded-xl border-2" style={{ maxHeight: 300, borderColor: 'var(--ink)' }} />
          ) : (
            <div className="mt-4 mx-auto w-48 h-48 rounded-xl flex items-center justify-center text-5xl" style={{ background: 'var(--paper-dark)', border: '2px dashed var(--ink-soft)' }}>
              📷
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => onFile(e.target.files[0])} />
          <div className="mt-4">
            <button className="btn btn-primary" onClick={() => fileRef.current?.click()}>{draft.photo ? 'change photo' : 'upload photo'}</button>
          </div>
          <div className="mt-4">
            <button className="btn" onClick={() => setStep(2)} disabled={!draft.photo}>next →</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="dashed-card p-5 mt-5">
          <div className="hand text-xl mb-2">the mean thing</div>
          <p className="body mb-3" style={{ color: 'var(--ink-soft)' }}>
            What's the last negative thing you told yourself? Self-imposed limit, logical-but-unhealthy invalidation, or the core-shaking thought. Write it all down.
          </p>
          <textarea rows={5} value={draft.mean} onChange={e => setDraft(d => ({ ...d, mean: e.target.value }))} autoFocus />
          <div className="mt-4 flex gap-2">
            <button className="btn" onClick={() => setStep(1)}>← back</button>
